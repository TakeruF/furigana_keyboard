name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-and-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test reading-data tools
        run: python3 -m unittest discover -s tools/tests -v
      - name: Test and lint Android flavors
        run: >-
          ./gradlew
          :app:testPlayDebugUnitTest
          :app:testDirectDebugUnitTest
          :app:lintPlayDebug
          :app:lintDirectDebug

  about-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: about
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: about/package-lock.json
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - run: npm test
      - run: npm run lint

  ios:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Create test simulator
        id: simulator
        run: |
          runtime=$(xcrun simctl list runtimes available -j | jq -r '[.runtimes[] | select(.platform == "iOS")][-1].identifier')
          device=$(xcrun simctl list devicetypes -j | jq -r '[.devicetypes[] | select(.name | startswith("iPhone"))][0].identifier')
          udid=$(xcrun simctl create FuriganaKeyboardCI "$device" "$runtime")
          echo "udid=$udid" >> "$GITHUB_OUTPUT"
      - name: Build and test iOS app and keyboard
        run: >-
          xcodebuild
          -project FuriganaKeyboard.xcodeproj
          -scheme FuriganaKeyboard
          -configuration Debug
          -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}'
          -derivedDataPath DerivedData/CI
          CODE_SIGNING_ALLOWED=NO
          test
      - name: Verify iOS distribution resources
        run: |
          app="DerivedData/CI/Build/Products/Debug-iphonesimulator/Furigana Keyboard.app"
          test -f "$app/PrivacyInfo.xcprivacy"
          test -f "$app/PlugIns/FuriganaKeyboardExtension.appex/PrivacyInfo.xcprivacy"
          test -f "$app/THIRD-PARTY-NOTICES.txt"
          test -f "$app/ZINNIA-BSD.txt"
          test -f "$app/TEGAKI-MODEL-LGPL-2.1.txt"
          test -f "$app/EDRDG-CC-BY-SA-4.0.txt"
          plutil -lint "$app/PrivacyInfo.xcprivacy"
          plutil -lint "$app/PlugIns/FuriganaKeyboardExtension.appex/PrivacyInfo.xcprivacy"
