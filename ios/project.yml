name: FuriganaKeyboard

options:
  bundleIdPrefix: app.hanlu.furiganakeyboard
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    SWIFT_VERSION: 5.0
    OTHER_SWIFT_FLAGS: "$(inherited) -debug-prefix-map $(SRCROOT)=."
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
  configs:
    Release:
      COPY_PHASE_STRIP: true
      DEPLOYMENT_POSTPROCESSING: true
      STRIP_INSTALLED_PRODUCT: true
      STRIP_STYLE: all

schemes:
  FuriganaKeyboard:
    build:
      targets:
        FuriganaKeyboard: all
        FuriganaKeyboardTests: [test]
    test:
      targets:
        - FuriganaKeyboardTests

targets:
  FuriganaKeyboard:
    type: application
    platform: iOS
    sources:
      - Sources/App
      - Sources/Shared
      - path: ../app/src/main/assets/legal
        buildPhase: resources
      - path: ../app/src/main/assets/licenses
        buildPhase: resources
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Furigana Keyboard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/App/FuriganaKeyboard.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: app.hanlu.furiganakeyboard
        PRODUCT_NAME: Furigana Keyboard
        PRODUCT_MODULE_NAME: FuriganaKeyboard
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: FuriganaKeyboardExtension
        embed: true
      - sdk: libsqlite3.tbd

  FuriganaKeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/KeyboardExtension
      - path: Sources/Shared
      - path: Sources/Recognition
      - path: ../app/src/main/cpp/zinnia
        excludes:
          - "*.h"
      - path: ../app/src/main/assets/handwriting-ja.model
        buildPhase: resources
      - path: ../app/src/main/assets/reading.db
        buildPhase: resources
    info:
      path: Sources/KeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: Furigana Keyboard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeft: false
            PrimaryLanguage: ja-JP
            RequestsOpenAccess: false
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).KeyboardViewController"
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Sources/KeyboardExtension/FuriganaKeyboardExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: app.hanlu.furiganakeyboard.keyboard
        PRODUCT_NAME: FuriganaKeyboardExtension
        PRODUCT_MODULE_NAME: FuriganaKeyboardExtension
        SKIP_INSTALL: true
        APPLICATION_EXTENSION_API_ONLY: true
        SWIFT_OBJC_BRIDGING_HEADER: Sources/KeyboardExtension/KeyboardExtension-Bridging-Header.h
        HEADER_SEARCH_PATHS: "$(SRCROOT)/../app/src/main/cpp/zinnia"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - HAVE_SYS_TYPES_H=1
          - HAVE_SYS_STAT_H=1
          - HAVE_FCNTL_H=1
          - HAVE_STRING_H=1
          - HAVE_SYS_MMAN_H=1
          - HAVE_UNISTD_H=1
          - HAVE_MMAP=1
          - WORDS_LITENDIAN=1
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        OTHER_CFLAGS: "$(inherited) -ffile-prefix-map=$(SRCROOT)=. -fdebug-prefix-map=$(SRCROOT)=. -ffile-prefix-map=$(HOME)/GitHub/furigana_keyboard=/src -fdebug-prefix-map=$(HOME)/GitHub/furigana_keyboard=/src"
        OTHER_CPLUSPLUSFLAGS: "$(inherited) -Wall -Wextra -Wno-unused-parameter -ffile-prefix-map=$(SRCROOT)=. -fdebug-prefix-map=$(SRCROOT)=. -ffile-prefix-map=$(HOME)/GitHub/furigana_keyboard=/src -fdebug-prefix-map=$(HOME)/GitHub/furigana_keyboard=/src"
      configs:
        Release:
          DEPLOYMENT_POSTPROCESSING: true
          STRIP_INSTALLED_PRODUCT: true
          STRIP_STYLE: all
    dependencies:
      - sdk: libsqlite3.tbd

  FuriganaKeyboardTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: FuriganaKeyboard
    sources:
      - Tests
      - path: ../fixtures/conversion-cost.tsv
        buildPhase: resources
      - path: ../fixtures/conversion-nbest.json
        buildPhase: resources
      - path: ../fixtures/sentence-conversion-regression.json
        buildPhase: resources
      - Sources/KeyboardExtension/BunsetsuState.swift
      - Sources/KeyboardExtension/ConversionCost.swift
      - Sources/KeyboardExtension/KanaKanjiConverter.swift
      - Sources/KeyboardExtension/HandwritingStrokeSegmenter.swift
      - Sources/KeyboardExtension/ReadingRepository.swift
    dependencies:
      - target: FuriganaKeyboard
      - sdk: libsqlite3.tbd
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: app.hanlu.furiganakeyboard.tests
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) REPOSITORY_TEST_HOST"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Furigana Keyboard.app/Furigana Keyboard"
        BUNDLE_LOADER: "$(TEST_HOST)"
